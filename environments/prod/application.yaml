apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pedido-app-prod
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/MariSalas23/Patrones_Parcial_I.git
    targetRevision: main
    path: charts/pedido-app
    helm:
      releaseName: pedido-app
      valueFiles:
        - values-prod.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: pedido-prod

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ApplyOutOfSyncOnly=true

  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      name: pedido-postgresql
      namespace: pedido-prod
      jsonPointers:
        - /spec/volumeClaimTemplates