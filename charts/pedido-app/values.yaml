global:
  security:
    allowInsecureImages: true

frontend:
  image:
    repository: pedido-frontend
    tag: "1.0"
  replicas: 2
  service:
    port: 80

backend:
  image:
    repository: pedido-backend
    tag: "1.0"

  replicas: 2

  service:
    port: 80

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      memory: "512Mi"

  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 80

database:
  host: pedido-postgresql
  port: 5432
  name: pedidosdb
  user: postgres
  password: postgres

postgresql:
  enabled: true

  fullnameOverride: pedido-postgresql

  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 16.4.0-debian-12-r9

  auth:
    database: pedidosdb
    username: postgres
    password: postgres
    postgresPassword: postgres

  primary:
    persistence:
      enabled: true
      size: 1Gi

    initdb:
      scripts:
        init.sql: |
          CREATE TABLE IF NOT EXISTS pedidos (
            id SERIAL PRIMARY KEY,
            cliente VARCHAR(100),
            producto VARCHAR(100),
            cantidad INT
          );