apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: pedidos
    component: backend

spec:
  replicas: {{ .Values.backend.replicas | default 2 }}

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8080

          envFrom:
            - configMapRef:
                name: backend-config
            - secretRef:
                name: backend-secret

          {{- if .Values.backend.resources }}
          resources:
{{ toYaml .Values.backend.resources | indent 12 }}
          {{- end }}

          volumeMounts:
            - name: pedidos-storage
              mountPath: /data

      volumes:
        - name: pedidos-storage
          persistentVolumeClaim:
            claimName: pedidos-pvc