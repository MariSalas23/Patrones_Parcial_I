apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pedido-ingress
  labels:
    app: pedidos
    component: ingress
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80