apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pedido-ingress
  labels:
    app: pedidos
    component: ingress

spec:
  ingressClassName: nginx

  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:

          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: {{ .Values.backend.service.port }}

          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: {{ .Values.frontend.service.port }}