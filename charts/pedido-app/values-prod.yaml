backend:
  image:
    repository: pedido-backend
    tag: "1.0"

  replicas: 2

  service:
    port: 80

  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      memory: "1Gi"

  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 60

frontend:
  image:
    repository: pedido-frontend
    tag: "1.0"

  replicas: 1

  service:
    port: 80

  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      memory: "256Mi"

postgresql:
  primary:
    persistence:
      size: 5Gi

ingress:
  host: pedido-app.com