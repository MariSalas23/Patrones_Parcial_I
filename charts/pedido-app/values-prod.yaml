backend:
  image:
    tag: "1.0"
  replicaCount: 2
  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
    limits:
      memory: "1Gi"
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    targetCPUUtilizationPercentage: 60

frontend:
  image:
    tag: "1.0"
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      memory: "256Mi"

db:
  postgresql:
    primary:
      persistence:
        size: 5Gi

ingress:
  host: "pedido-app.com"