backend:
  image:
    tag: "1.0"
  replicaCount: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70

frontend:
  image:
    tag: "1.0"
  replicaCount: 1
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      memory: "128Mi"

db:
  postgresql:
    primary:
      persistence:
        size: 1Gi

ingress:
  host: "pedido-app-dev.local"