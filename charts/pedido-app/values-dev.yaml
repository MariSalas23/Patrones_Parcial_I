backend:
  image:
    repository: pedido-backend
    tag: "1.0"

  replicas: 1

  service:
    port: 80

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      memory: "512Mi"

  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 3
    targetCPUUtilizationPercentage: 70


frontend:
  image:
    repository: pedido-frontend
    tag: "1.0"

  replicas: 1

  service:
    port: 80

  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      memory: "128Mi"

postgresql:
  primary:
    persistence:
      size: 1Gi

ingress:
  host: dev.pedidos.local